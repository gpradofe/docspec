name: Rust Processor CI

on:
  push:
    branches: [main]
    paths:
      - 'rust/**'
  pull_request:
    branches: [main]
    paths:
      - 'rust/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/annotations/target/
            rust/processor/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build annotations crate
        run: |
          cd rust/annotations
          cargo build

      - name: Build processor
        run: |
          cd rust/processor
          cargo build

      - name: Run tests
        run: |
          cd rust/processor
          cargo test

      - name: Clippy
        run: |
          cd rust/processor
          cargo clippy -- -D warnings

      - name: Format check
        run: |
          cd rust/processor
          cargo fmt -- --check
