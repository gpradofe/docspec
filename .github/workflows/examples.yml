name: Examples CI

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'

jobs:
  java-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build DocSpec Java
        run: cd java && mvn install -DskipTests -q

      - name: Build spring-boot-zero-config
        run: cd examples/spring-boot-zero-config && mvn compile

      - name: Build waypoint-engine
        run: cd examples/waypoint-engine && mvn compile

      - name: Validate waypoint-engine
        run: cd examples/waypoint-engine && mvn docspec:validate

  docs-site:
    runs-on: ubuntu-latest
    needs: java-examples
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build DocSpec Java
        run: cd java && mvn install -DskipTests -q

      - name: Build examples
        run: |
          cd examples/spring-boot-zero-config && mvn compile
          cd ../waypoint-engine && mvn compile

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Build site packages
        run: cd site && pnpm install && pnpm -r build

      - name: Resolve docs site
        run: |
          cd examples/example-docs-site
          node ../../site/cli/dist/index.js resolve -c docspec.config.yaml
