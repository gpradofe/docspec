name: Python Processor CI

on:
  push:
    branches: [main]
    paths:
      - 'python/**'
  pull_request:
    branches: [main]
    paths:
      - 'python/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install annotations
        run: |
          cd python/annotations
          pip install -e .

      - name: Install processor
        run: |
          cd python/processor
          pip install -e .

      - name: Install CLI
        run: |
          cd python/plugin
          pip install -e .

      - name: Run tests
        run: |
          cd python/processor
          python -m pytest tests/

      - name: Type check
        run: |
          pip install mypy
          cd python/processor
          python -m mypy docspec_processor/
