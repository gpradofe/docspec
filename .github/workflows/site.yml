name: Site CI

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: cd site && pnpm install --frozen-lockfile

      - name: Build all packages
        run: cd site && pnpm -r build

      - name: Test
        run: cd site && pnpm -r test

      - name: Type check
        run: cd site && pnpm -r typecheck

      - name: Lint
        run: cd site && pnpm -r lint
