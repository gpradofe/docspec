# DocSpec Configuration — Spring Boot Zero Config Example
# Demonstrates Tier 0: auto-discovery with zero annotations

site:
  name: "Spring Boot Zero Config"
  description: "Auto-discovered documentation from a Spring Boot application"
  theme: "@docspec/theme-stripe"
  baseUrl: http://localhost:3000

artifacts:
  - path: ./target/docspec.json
    label: "Spring Boot App"
    color: "#22c55e"
    language: java

# Zero-config: no explicit navigation needed — auto-generated from discovered modules
navigation:
  - section: API Reference
    items: [endpoints/auto]
  - section: Libraries
    items: [modules/auto]
  - section: Architecture
    items: [data-models/auto, flows/auto]

build:
  outputDir: ./docs-site/out
  cacheDir: ./.docspec-cache
  discovery:
    mode: auto
    frameworks: [spring-boot, jpa, jackson]
  search: true

# How to use:
# 1. mvn docspec:generate          — produces target/docspec.json
# 2. npx docspec dev               — starts docs site at localhost:3000
# 3. npx docspec build             — static site in docs-site/out/
