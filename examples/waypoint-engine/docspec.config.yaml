# DocSpec Configuration — Waypoint Engine
# Demonstrates Tier 2: full annotations with DSTI

site:
  name: "Waypoint Engine"
  description: "AI-powered curriculum generation engine — full documentation"
  theme: "@docspec/theme-stripe"
  baseUrl: https://docs.waypoint.dev

artifacts:
  - path: ./target/docspec.json
    label: "Waypoint Engine"
    color: "#6366f1"
    language: java
    groupId: com.waypoint
    artifactId: waypoint-engine
    version: "2.3.1"

# Full navigation with all 6 sections
navigation:
  - section: Learn
    items:
      - docs/getting-started/introduction.md
      - docs/getting-started/quickstart.md
      - docs/architecture/overview.md
  - section: API Reference
    items: [endpoints/auto]
  - section: Libraries & SDKs
    items: [modules/auto]
  - section: Architecture
    items:
      - flows/auto
      - data-models/auto
      - data-stores/auto
      - configuration/auto
      - security/auto
      - dependency-map/auto
  - section: Testing
    items:
      - test-overview/auto
      - intent-graph/auto
      - gap-report/auto
  - section: Changelog
    items: [changelog/auto]

# OpenAPI integration
protocols:
  openapi: ./specs/openapi.json

# DSTI configuration
dsti:
  enabled: true
  channels: all
  testFramework: junit5
  propertyTestFramework: jqwik
  generateMocks: true

# LLM integration
ai:
  llmsTxt: true
  claudeMd: true
  mcpServer: true

build:
  outputDir: ./docs-site/out
  cacheDir: ./.docspec-cache
  discovery:
    mode: annotated
    frameworks: [spring-boot, jpa, jackson]
  search: true
  coverage:
    threshold: 80
    failOnBelowThreshold: true

# How to use:
# 1. mvn install -DskipTests        — builds the project
# 2. mvn docspec:generate            — produces target/docspec.json
# 3. mvn docspec:validate            — validates against schema
# 4. mvn docspec:coverage            — checks 80% coverage
# 5. mvn docspec:generate-tests      — generates DSTI test stubs
# 6. npx docspec dev                 — starts docs site
# 7. npx docspec build               — static site generation
