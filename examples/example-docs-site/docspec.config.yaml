# DocSpec Example Documentation Site
# Resolves all language examples across Tier 0/1/2

site:
  name: "DocSpec Examples"
  theme: "@docspec/theme-stripe"
  baseUrl: /

artifacts:
  # Java Tier 2 — Full annotations
  - name: waypoint-engine
    label: "Waypoint Engine"
    color: "#818cf8"
    source:
      type: local
      path: ../waypoint-engine/target/docspec.json

  # Java Tier 0 — Zero config auto-discovery
  - name: spring-boot-bookstore
    label: "Spring Boot Bookstore"
    color: "#34d399"
    source:
      type: local
      path: ../spring-boot-zero-config/target/docspec.json

  # TypeScript Tier 2
  - name: nexus-conversation-sdk
    label: "Nexus SDK (TS)"
    color: "#8B5CF6"
    source:
      type: local
      path: ../typescript-nexus-sdk/docspec-output/docspec.json

  # Python Tier 2
  - name: data-sync-service
    label: "Sync Service (Py)"
    color: "#10B981"
    source:
      type: local
      path: ../python-fastapi-service/docspec-output/docspec.json

  # Rust Tier 2
  - name: finddoc-core
    label: "FindDoc (Rust)"
    color: "#F97316"
    source:
      type: local
      path: ../rust-finddoc-core/docspec-output/docspec.json

  # TypeScript Tier 0
  - name: ts-express-zero
    label: "Express Zero (TS)"
    color: "#3B82F6"
    source:
      type: local
      path: ../typescript-express-zero-config/docspec-output/docspec.json

  # Python Tier 0
  - name: py-flask-zero
    label: "Flask Zero (Py)"
    color: "#22C55E"
    source:
      type: local
      path: ../python-flask-zero-config/docspec-output/docspec.json

  # Rust Tier 0
  - name: rust-lib-zero
    label: "Rust Lib Zero"
    color: "#EF4444"
    source:
      type: local
      path: ../rust-lib-zero-config/docspec-output/docspec.json

  # C# Tier 0
  - name: csharp-webapi-zero
    label: "WebAPI Zero (C#)"
    color: "#A855F7"
    source:
      type: local
      path: ../csharp-webapi-zero-config/docspec-output/docspec.json

  # Go Tier 0
  - name: go-rest-zero
    label: "Go REST Zero"
    color: "#06B6D4"
    source:
      type: local
      path: ../go-rest-zero-config/docspec-output/docspec.json

  # Full-annotated Tier 2 examples (5 languages)
  - name: ts-full
    label: "TS Full"
    color: "#6366F1"
    source:
      type: local
      path: ../typescript-full-annotated/docspec-output/docspec.json

  - name: py-full
    label: "Python Full"
    color: "#059669"
    source:
      type: local
      path: ../python-full-annotated/docspec-output/docspec.json

  - name: rust-full
    label: "Rust Full"
    color: "#DC2626"
    source:
      type: local
      path: ../rust-full-annotated/docspec-output/docspec.json

  - name: csharp-full
    label: "C# Full"
    color: "#7C3AED"
    source:
      type: local
      path: ../csharp-full-annotated/docspec-output/docspec.json

  - name: go-full
    label: "Go Full"
    color: "#0891B2"
    source:
      type: local
      path: ../go-full-annotated/docspec-output/docspec.json

navigation:
  - section: Java
    items:
      - artifacts/waypoint-engine
      - artifacts/spring-boot-bookstore

  - section: TypeScript
    items:
      - artifacts/nexus-conversation-sdk
      - artifacts/ts-express-zero
      - artifacts/ts-full

  - section: Python
    items:
      - artifacts/data-sync-service
      - artifacts/py-flask-zero
      - artifacts/py-full

  - section: Rust
    items:
      - artifacts/finddoc-core
      - artifacts/rust-lib-zero
      - artifacts/rust-full

  - section: "C#"
    items:
      - artifacts/csharp-webapi-zero
      - artifacts/csharp-full

  - section: Go
    items:
      - artifacts/go-rest-zero
      - artifacts/go-full

  - section: Architecture
    auto: true

build:
  outputDir: ./out
  cacheDir: ./.docspec-cache
  search: true
