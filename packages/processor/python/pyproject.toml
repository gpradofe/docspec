[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "docspec-processor-python"
version = "0.1.0"
description = "DocSpec processor for Python projects"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = ["docspec-py>=0.1.0"]

[tool.hatch.build.targets.wheel]
packages = ["docspec_processor"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "mypy>=1.0"]

[tool.hatch.envs.default]
# For local development, install the annotations package from the sibling directory
extra-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

# pip install -e ../../annotations/python   (to link docspec-py locally)
