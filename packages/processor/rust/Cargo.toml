[package]
name = "docspec-processor"
version = "0.1.0"
edition = "2021"
description = "DocSpec processor for Rust projects"
license = "Apache-2.0"

[[bin]]
name = "docspec-rust"
path = "src/main.rs"

[dependencies]
docspec-macros = { path = "../../annotations/rust" }
syn = { version = "2", features = ["full", "parsing", "extra-traits", "visit"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
regex = "1"
quote = "1"
