# DocSpec Self-Documentation
# DocSpec documenting itself — the meta-dogfooding goal

site:
  name: "DocSpec"
  description: "Universal documentation specification & toolchain — documenting itself"
  theme: "@docspec/theme-stripe"
  baseUrl: http://localhost:4000

artifacts:
  - path: ./docspec-annotations.json
    label: "Annotations"
    color: "#a855f7"

  - path: ./docspec-processor.json
    label: "DocSpec Processor"
    color: "#6366f1"

  - path: ./docspec-maven-plugin.json
    label: "Maven Plugin"
    color: "#22c55e"

# Use auto: true per section — lets the navigation builder auto-populate from pages
navigation:
  - section: Libraries
    auto: true
    tab: docs
  - section: API
    auto: true
    tab: docs
  - section: Architecture
    auto: true
    tab: docs
  - section: Tests
    auto: true
    tab: tests

build:
  outputDir: ./out
  cacheDir: ./.docspec-cache
  search: true

dsti:
  enabled: true
  channels: all

ai:
  llmsTxt: true
